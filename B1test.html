<div id="crashlog" style="display:none; position:fixed; inset:0; background:#fff3f3; color:#7A2E2E; padding:16px; font-family:monospace; font-size:13px; white-space:pre-wrap; overflow:auto; z-index:9999;"></div>
<script>
  function showCrash(msg) {
    const el = document.getElementById("crashlog");
    el.style.display = "block";
    el.textContent = "エラーが発生しました:\n\n" + msg;
  }
  window.onerror = function (msg, src, line, col, err) {
    showCrash(msg + "\n" + (src || "") + ":" + line + ":" + col + "\n" + (err && err.stack ? err.stack : ""));
  };
  window.addEventListener("unhandledrejection", function (e) {
    showCrash("Promise rejected: " + (e.reason && e.reason.message ? e.reason.message : e.reason));
  });
</script>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

/* ========= ハンデ計算（App A/B2と共通） ========= */
function roundHalfToEven(v) {
  const w = Math.floor(v);
  const d = v - w;
  if (Math.abs(d - 0.5) > 1e-9) return d > 0.5 ? w + 1 : w;
  return w % 2 === 1 ? w + 1 : w;
}
function normalizeRace(rt1, rt2, lowClamp) {
  const highClamp = 99.0;
  const p1IsHigh = rt1 >= rt2;
  const highRace = Math.max(rt1, rt2), lowRace = Math.min(rt1, rt2);
  let highC = highRace > highClamp ? highClamp : highRace;
  let lowC = highRace > highClamp ? lowRace - lowRace * ((highRace - highClamp) / highRace) : lowRace;
  highC = Math.min(lowRace < lowClamp ? highC + highC * ((lowClamp - lowRace) / lowC) : highC, highClamp);
  lowC = Math.max(lowC < lowClamp ? lowClamp : lowC, lowClamp);
  return { rt1: p1IsHigh ? highC : lowC, rt2: p1IsHigh ? lowC : highC };
}
function computeRace(R1, R2, lenPct) {
  const dampFactor = lenPct / 100;
  const avg = (R1 + R2) / 2;
  const gp = 0.018 * avg - 1.4;
  const delta = R1 - R2;
  const p1 = 1 - 1 / (1 + Math.pow(2, delta / 100));
  const p2 = 1 - p1;
  const p1AvgPts = p1 * 14.0 + p2 * (7.4 - 0.0062 * R2);
  const p2AvgPts = p2 * 14.0 + p1 * (7.4 - 0.0062 * R1);
  const rt1raw = p1AvgPts * gp * dampFactor;
  const rt2raw = p2AvgPts * gp * dampFactor;
  const lowClamp = 0.16 * lenPct + 12;
  const norm = normalizeRace(rt1raw, rt2raw, lowClamp);
  return { rt1: roundHalfToEven(norm.rt1), rt2: roundHalfToEven(norm.rt2), p1, p2 };
}

const FONT = "system-ui,-apple-system,'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif";
const C = {
  bg: "#FFFFFF", zone: "#F5F6F8", ink: "#1C2530", sub: "#6A7480", line: "#E4E7EB",
  blue: "#2E6DB5", red: "#C6392E", lightBlue: "#E9F1FB", lightRed: "#FBEBE9",
  win: "#2E7D46", hill: "#B26A1E", hillBg: "#FFF3E0", minus: "#C0392B",
};

/* このB1から発行するQRが指す先（B2アプリのURL）。実際にデプロイしたURLに合わせて調整してください */
const B2_URL = "https://kazexnora1.github.io/nora1/B2test.html";

/* ========= 共有バックエンド（App A/B2と同じBin） ========= */
const JSONBIN_ID = "6a59da56da38895dfe69af82";
const JSONBIN_KEY = "$2a$10$4387m6BO917eu5kfVN//hOwH0O4g1IHkX5sjqUfgj5Jf2t4VNUnwK";

async function jsonbinRead() {
  const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}/latest`, {
    headers: { "X-Master-Key": JSONBIN_KEY },
  });
  const data = await res.json();
  const record = data && data.record ? data.record : {};
  return {
    roster: Array.isArray(record.roster) ? record.roster : [],
    results: Array.isArray(record.results) ? record.results : [],
    matches: record.matches && typeof record.matches === "object" ? record.matches : {},
  };
}
async function jsonbinWrite(record) {
  await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json", "X-Master-Key": JSONBIN_KEY },
    body: JSON.stringify(record),
  });
}
async function saveRoster(roster) {
  const record = await jsonbinRead().catch(() => ({ roster: [], results: [], matches: {} }));
  record.roster = roster;
  await jsonbinWrite(record);
}
async function saveMatch(matchId, state) {
  const record = await jsonbinRead().catch(() => ({ roster: [], results: [], matches: {} }));
  record.matches = record.matches || {};
  record.matches[matchId] = { ...state, updatedAt: Date.now() };
  await jsonbinWrite(record);
}
function randomMatchId() {
  return Math.random().toString(36).slice(2, 8) + Date.now().toString(36).slice(-4);
}
const STALE_MS = 1000 * 60 * 60 * 6;
function isMatchFinished(m) {
  const rt = m.raceTo || [0, 0], tot = m.tot || [0, 0];
  return (rt[0] > 0 && tot[0] >= rt[0]) || (rt[1] > 0 && tot[1] >= rt[1]);
}
// 卓ごとの待機列：未終了の対戦を作成順に並べる。[0]が現在対戦中、[1]が次戦
function getQueueForTable(matches, tableNum) {
  const list = [];
  for (const id in matches) {
    const m = matches[id];
    if (!m || Number(m.table) !== tableNum) continue;
    if (!m.updatedAt || Date.now() - m.updatedAt > STALE_MS) continue;
    if (isMatchFinished(m)) continue;
    list.push({ ...m, id });
  }
  list.sort((a, b) => (a.createdAt || a.updatedAt) - (b.createdAt || b.updatedAt));
  return list;
}

let _id = 1;
const nid = () => _id++;

/* ========= ルート：タブ切替 ========= */
function App() {
  const [tab, setTab] = useState("members");
  const [roster, setRoster] = useState([]);
  const [rosterLoaded, setRosterLoaded] = useState(false);

  const refreshRoster = async () => {
    try {
      const r = await jsonbinRead();
      if (r.roster.length) _id = Math.max(..._idsOf(r.roster)) + 1;
      setRoster(r.roster);
    } catch {}
  };
  const _idsOf = (rs) => rs.map((p) => p.id || 0);

  useEffect(() => { (async () => { await refreshRoster(); setRosterLoaded(true); })(); }, []);

  const tabs = [
    ["members", "👥 メンバー"],
    ["schedule", "🎱 対戦表"],
    ["timeline", "📅 タイムライン"],
  ];

  return (
    <div style={{ minHeight: "100%", background: C.bg, fontFamily: FONT, display: "flex", flexDirection: "column" }}>
      <div style={{ flex: 1, minHeight: 0, overflowY: "auto" }}>
        {tab === "members" && <MembersTab roster={roster} setRoster={setRoster} onRefresh={refreshRoster} loaded={rosterLoaded} />}
        {tab === "schedule" && <ScheduleTab roster={roster} />}
        {tab === "timeline" && <TimelineTab />}
      </div>
      <div style={{ display: "flex", borderTop: `1px solid ${C.line}`, background: "#fff" }}>
        {tabs.map(([key, label]) => (
          <button key={key} onClick={() => setTab(key)}
            style={{ flex: 1, padding: "12px 0", background: "none", border: "none", fontSize: 13, fontWeight: tab === key ? 800 : 600, color: tab === key ? C.blue : C.sub, cursor: "pointer", fontFamily: FONT }}>
            {label}
          </button>
        ))}
      </div>
    </div>
  );
}

/* ========= メンバータブ ========= */
function MembersTab({ roster, setRoster, onRefresh, loaded }) {
  const [saving, setSaving] = useState(false);
  const saveTimer = useRef(null);
  const rosterRef = useRef(roster);
  rosterRef.current = roster;

  const update = (id, k, v) => setRoster((rs) => rs.map((p) => (p.id === id ? { ...p, [k]: v } : p)));
  const remove = (id) => setRoster((rs) => rs.filter((p) => p.id !== id));
  const add = () => roster.length < 40 && setRoster((rs) => [...rs, { id: nid(), name: `選手${rs.length + 1}`, r: "" }]);

  const persist = () => {
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      setSaving(true);
      await saveRoster(rosterRef.current).catch(() => {});
      setSaving(false);
    }, 500);
  };

  useEffect(() => { if (loaded) persist(); }, [roster]);

  return (
    <div style={{ maxWidth: 480, margin: "0 auto", padding: "20px 16px 24px", color: C.ink }}>
      <div style={{ textAlign: "center", marginBottom: 14 }}>
        <div style={{ fontSize: 22, fontWeight: 800 }}>メンバーリスト</div>
        <div style={{ fontSize: 13, color: C.sub, marginTop: 4 }}>{saving ? "保存中…" : "名前とファーゴレート（共有）"}</div>
        <button onClick={onRefresh} style={{ marginTop: 8, background: "#fff", border: `1px solid ${C.line}`, borderRadius: 10, color: C.ink, fontSize: 13, fontWeight: 700, padding: "7px 12px", cursor: "pointer", fontFamily: FONT }}>🔄 更新</button>
      </div>
      {roster.map((p) => (
        <div key={p.id} style={{ display: "flex", gap: 8, marginBottom: 8, alignItems: "center" }}>
          <input value={p.name} onChange={(e) => update(p.id, "name", e.target.value.slice(0, 12))}
            style={{ flex: 1, minWidth: 0, background: "#fff", border: `1px solid ${C.line}`, borderRadius: 10, color: C.ink, fontSize: 15, padding: "10px 12px", outline: "none", fontFamily: FONT }} />
          <input inputMode="numeric" value={p.r} onChange={(e) => update(p.id, "r", e.target.value.replace(/[^0-9]/g, "").slice(0, 3))}
            style={{ width: 80, background: "#fff", border: `1px solid ${C.line}`, borderRadius: 10, color: C.ink, fontSize: 15, fontWeight: 700, padding: "10px 0", textAlign: "center", outline: "none", fontFamily: FONT }} />
          <button onClick={() => remove(p.id)} style={{ width: 40, height: 40, background: "#fff", border: `1px solid ${C.line}`, borderRadius: 10, color: C.sub, fontSize: 18, cursor: "pointer" }}>×</button>
        </div>
      ))}
      {roster.length < 40 && (
        <button onClick={add} style={{ width: "100%", background: "#fff", border: `2px dashed ${C.blue}`, borderRadius: 10, color: C.blue, fontSize: 14.5, fontWeight: 700, padding: "12px 0", cursor: "pointer", fontFamily: FONT }}>＋ 選手を追加</button>
      )}
    </div>
  );
}

/* ========= 対戦表タブ（対戦作成＝実質のB1本体） ========= */
function ScheduleTab({ roster }) {
  const [i1, setI1] = useState(0);
  const [i2, setI2] = useState(roster.length > 1 ? 1 : 0);
  const [table, setTable] = useState(1);
  const [lenPct, setLenPct] = useState(100);
  const [tableStatus, setTableStatus] = useState([null, null, null]);
  const [creating, setCreating] = useState(false);
  const [createdInfo, setCreatedInfo] = useState(null);
  const [showImport, setShowImport] = useState(false);
  const [importText, setImportText] = useState("");
  const [importMsg, setImportMsg] = useState(null);
  const [importing, setImporting] = useState(false);

  // 試合割り作成ツールが出力した matches JSON を一括登録する
  const runImport = async () => {
    if (importing) return;
    let parsed;
    try {
      parsed = JSON.parse(importText);
    } catch (e) {
      setImportMsg({ ok: false, text: "JSONの形式が正しくありません" });
      return;
    }
    const ids = Object.keys(parsed || {});
    if (!ids.length) {
      setImportMsg({ ok: false, text: "対戦が入っていません" });
      return;
    }
    const bad = ids.find((id) => !parsed[id] || !Array.isArray(parsed[id].names) || !parsed[id].table);
    if (bad) {
      setImportMsg({ ok: false, text: "対戦データの中身が想定と違います" });
      return;
    }
    if (!window.confirm(`${ids.length}件の対戦を登録します。\n現在の対戦はすべて置き換えられます。よろしいですか？`)) return;
    setImporting(true);
    try {
      const record = await jsonbinRead().catch(() => ({ roster: [], results: [], matches: {} }));
      const now = Date.now();
      const next = {};
      ids.forEach((id, i) => {
        const m = parsed[id];
        next[id] = { ...m, createdAt: m.createdAt || now + i * 1000, updatedAt: now };
      });
      record.matches = next; // 総入れ替え（前回大会の残りを一掃）
      await jsonbinWrite(record);
      setImportMsg({ ok: true, text: `${ids.length}件を登録しました` });
      setImportText("");
      refreshStatus();
    } catch (e) {
      setImportMsg({ ok: false, text: "登録に失敗しました: " + (e && e.message ? e.message : e) });
    }
    setImporting(false);
  };

  const refreshStatus = async () => {
    try {
      const r = await jsonbinRead();
      setTableStatus([1, 2, 3].map((t) => getQueueForTable(r.matches, t)[0] || null));
    } catch {}
  };
  useEffect(() => { refreshStatus(); const iv = setInterval(refreshStatus, 4000); return () => clearInterval(iv); }, []);

  const p1 = roster[i1], p2 = roster[i2];
  const R1 = p1 ? parseInt(p1.r, 10) : 0, R2 = p2 ? parseInt(p2.r, 10) : 0;
  const valid = p1 && p2 && i1 !== i2 && R1 > 0 && R2 > 0;
  const res = valid ? computeRace(R1, R2, lenPct) : null;

  const create = async () => {
    if (!valid || creating) return;
    setCreating(true);
    const matchId = randomMatchId();
    const state = {
      version: 1, phase: "banking", brk: null, tot: [0, 0], rack: 1,
      balls: Array.from({ length: 9 }, (_, i) => ({ n: i + 1, loc: "c", dead: false })),
      lastResult: null, hist: [], raceTo: [res.rt1, res.rt2],
      names: [p1.name, p2.name], table, createdAt: Date.now(),
    };
    await saveMatch(matchId, state).catch(() => {});
    const url = new URL(B2_URL);
    url.searchParams.set("m", matchId);
    url.searchParams.set("p1", p1.name);
    url.searchParams.set("p2", p2.name);
    url.searchParams.set("r1", R1);
    url.searchParams.set("r2", R2);
    url.searchParams.set("len", lenPct);
    url.searchParams.set("t", table);
    setCreatedInfo({ url: url.toString(), table, names: [p1.name, p2.name], raceTo: [res.rt1, res.rt2] });
    setCreating(false);
    refreshStatus();
  };

  return (
    <div style={{ maxWidth: 480, margin: "0 auto", padding: "20px 16px 24px", color: C.ink }}>
      <div style={{ textAlign: "center", marginBottom: 16 }}>
        <div style={{ fontSize: 22, fontWeight: 800 }}>対戦表</div>
        <div style={{ fontSize: 13, color: C.sub, marginTop: 4 }}>卓と対戦者を決めて対戦を作成します</div>
      </div>

      <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
        {[1, 2, 3].map((t) => {
          const st = tableStatus[t - 1];
          const label = !st ? "空き" : st.phase === "banking" ? "バンキング中" : st.phase === "done" ? "ラック終了" : "対戦中";
          return (
            <div key={t} style={{ flex: 1, background: C.zone, border: `2px solid ${table === t ? C.blue : C.line}`, borderRadius: 12, padding: "10px 6px", textAlign: "center", cursor: "pointer" }} onClick={() => setTable(t)}>
              <div style={{ fontSize: 13, fontWeight: 800, color: table === t ? C.blue : C.ink }}>卓{t}</div>
              <div style={{ fontSize: 10.5, color: st ? C.win : C.sub, marginTop: 4 }}>{label}</div>
              {st && <div style={{ fontSize: 9.5, color: C.sub, marginTop: 2, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{st.names ? st.names.join(" / ") : ""}</div>}
            </div>
          );
        })}
      </div>

      <Field label="プレイヤー1">
        <select value={i1} onChange={(e) => setI1(+e.target.value)} style={selectStyle}>
          {roster.map((p, i) => <option key={p.id} value={i}>{p.name || "（無名）"}　{p.r ? `Fargo ${p.r}` : ""}</option>)}
        </select>
      </Field>
      <Field label="プレイヤー2">
        <select value={i2} onChange={(e) => setI2(+e.target.value)} style={selectStyle}>
          {roster.map((p, i) => <option key={p.id} value={i}>{p.name || "（無名）"}　{p.r ? `Fargo ${p.r}` : ""}</option>)}
        </select>
      </Field>

      <div style={{ background: C.zone, border: `1px solid ${C.line}`, borderRadius: 14, padding: 14, margin: "14px 0" }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
          <span style={{ fontSize: 14, fontWeight: 700 }}>試合の長さ</span>
          <span style={{ fontSize: 16, fontWeight: 800 }}>{lenPct}%</span>
        </div>
        <input type="range" min={40} max={140} step={5} value={lenPct} onChange={(e) => setLenPct(+e.target.value)} style={{ width: "100%", accentColor: C.blue }} />
        <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
          {[["ショート", 75], ["ロング", 100], ["長め", 120]].map(([t, v]) => (
            <button key={t} onClick={() => setLenPct(v)} style={{ flex: 1, border: `2px solid ${lenPct === v ? C.blue : C.line}`, background: lenPct === v ? C.lightBlue : "#fff", borderRadius: 8, padding: "8px 0", fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}>{t}</button>
          ))}
        </div>
      </div>

      {i1 === i2 && <Notice>同じ選手が選ばれています</Notice>}
      {res && (
        <div style={{ textAlign: "center", marginBottom: 14, fontSize: 15 }}>
          目標点：<b style={{ color: C.blue }}>{res.rt1}</b> 対 <b style={{ color: C.red }}>{res.rt2}</b>
        </div>
      )}

      <button onClick={create} disabled={!valid || creating} style={{ width: "100%", background: valid ? C.ink : C.line, color: valid ? "#fff" : C.sub, border: "none", borderRadius: 14, padding: "15px 0", fontSize: 16, fontWeight: 800, cursor: valid ? "pointer" : "default", fontFamily: FONT }}>
        {creating ? "作成中…" : `卓${table}に対戦を作成 ▶`}
      </button>

      {createdInfo && (
        <div style={{ marginTop: 18, textAlign: "center" }}>
          <div style={{ fontSize: 13.5, color: C.win, fontWeight: 700, marginBottom: 10 }}>✓ 卓{createdInfo.table}に作成しました</div>
          <img src={`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(createdInfo.url)}`} style={{ width: 200, height: 200 }} />
          <div style={{ fontSize: 12, color: C.sub, marginTop: 8 }}>{createdInfo.names.join(" 対 ")}</div>
        </div>
      )}

      <div style={{ marginTop: 24, paddingTop: 18, borderTop: `1px solid ${C.line}` }}>
        <button onClick={() => setShowImport((v) => !v)} style={{ width: "100%", background: "#fff", border: `1px solid ${C.line}`, borderRadius: 12, color: C.ink, fontSize: 14.5, fontWeight: 700, padding: "12px 0", cursor: "pointer", fontFamily: FONT }}>
          📥 試合割りを取り込む {showImport ? "▲" : "▼"}
        </button>
        {showImport && (
          <div style={{ marginTop: 10 }}>
            <div style={{ fontSize: 12.5, color: C.sub, marginBottom: 8, lineHeight: 1.6 }}>
              試合割り作成ツールの「matches JSON をコピー」でコピーした内容を貼り付けて登録します。<br />
              <b style={{ color: C.hill }}>現在の対戦はすべて置き換わります。</b>
            </div>
            <textarea value={importText} onChange={(e) => setImportText(e.target.value)} rows={6}
              placeholder='{"abc123": { "names": [...], "table": 1, ... }, ...}'
              style={{ width: "100%", boxSizing: "border-box", border: `1px solid ${C.line}`, borderRadius: 10, padding: 10, fontSize: 13, fontFamily: "monospace", outline: "none", marginBottom: 8 }} />
            <button onClick={runImport} disabled={importing || !importText.trim()}
              style={{ width: "100%", background: importText.trim() && !importing ? C.blue : C.line, color: importText.trim() && !importing ? "#fff" : C.sub, border: "none", borderRadius: 12, padding: "13px 0", fontSize: 15, fontWeight: 800, cursor: importText.trim() && !importing ? "pointer" : "default", fontFamily: FONT }}>
              {importing ? "登録中…" : "この内容で登録する"}
            </button>
            {importMsg && (
              <div style={{ marginTop: 8, textAlign: "center", fontSize: 13, fontWeight: 700, color: importMsg.ok ? C.win : C.minus }}>
                {importMsg.ok ? "✓ " : "✗ "}{importMsg.text}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}
function Field({ label, children }) {
  return <div style={{ marginBottom: 10 }}><div style={{ fontSize: 13.5, fontWeight: 700, color: C.sub, marginBottom: 6 }}>{label}</div>{children}</div>;
}
function Notice({ children }) {
  return <div style={{ fontSize: 13.5, color: C.hill, background: C.hillBg, border: `1px solid ${C.hill}`, borderRadius: 10, padding: "8px 12px", marginBottom: 12 }}>{children}</div>;
}
const selectStyle = { width: "100%", boxSizing: "border-box", background: "#fff", border: `1px solid ${C.line}`, borderRadius: 10, color: C.ink, fontSize: 15, padding: "11px 12px", outline: "none", fontFamily: FONT };

/* ========= QR発行タブ ========= */
/* ========= タイムラインタブ：対戦カードを作成順（古い→新しい）に縦並び。進行中はリアルタイムスコア、タップでQR ========= */
function TimelineTab() {
  const [queues, setQueues] = useState([[], [], []]);
  const [openMatch, setOpenMatch] = useState(null);

  const refresh = async () => {
    try {
      const r = await jsonbinRead();
      setQueues([1, 2, 3].map((t) => getQueueForTable(r.matches, t)));
    } catch {}
  };
  useEffect(() => { refresh(); const iv = setInterval(refresh, 3000); return () => clearInterval(iv); }, []);

  const urlFor = (m) => {
    const rt = m.raceTo || [0, 0];
    const url = new URL(B2_URL);
    url.searchParams.set("m", m.id);
    url.searchParams.set("p1", m.names[0]);
    url.searchParams.set("p2", m.names[1]);
    url.searchParams.set("r1", 0);
    url.searchParams.set("r2", 0);
    url.searchParams.set("len", 100);
    url.searchParams.set("t", m.table);
    url.searchParams.set("rt1", rt[0]);
    url.searchParams.set("rt2", rt[1]);
    return url.toString();
  };

  return (
    <div style={{ padding: "20px 12px 24px", color: C.ink }}>
      <div style={{ textAlign: "center", marginBottom: 16 }}>
        <div style={{ fontSize: 22, fontWeight: 800 }}>タイムライン</div>
        <div style={{ fontSize: 13, color: C.sub, marginTop: 4 }}>上：現在対戦中／下：次戦。カードをタップでQR表示</div>
      </div>
      <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
        {[0, 1, 2].map((ti) => (
          <div key={ti} style={{ flex: 1, minWidth: 0, display: "flex", flexDirection: "column", gap: 8 }}>
            <div style={{ textAlign: "center", fontSize: 13, fontWeight: 800, color: C.sub, marginBottom: 2 }}>卓{ti + 1}</div>
            {queues[ti].length === 0 && <EmptySlot label="待機中" />}
            {queues[ti][0] && <TimelineCard m={queues[ti][0]} current onOpen={() => setOpenMatch(queues[ti][0])} />}
            {queues[ti][1] ? <TimelineCard m={queues[ti][1]} onOpen={() => setOpenMatch(queues[ti][1])} /> : queues[ti].length > 0 && <EmptySlot label="次戦なし" small />}
          </div>
        ))}
      </div>
      {openMatch && (
        <div onClick={() => setOpenMatch(null)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000, padding: 24 }}>
          <div onClick={(e) => e.stopPropagation()} style={{ background: "#fff", borderRadius: 18, padding: "24px 20px", textAlign: "center", maxWidth: 320, width: "100%" }}>
            <div style={{ fontSize: 16, fontWeight: 800, marginBottom: 12 }}>卓{openMatch.table}：{openMatch.names.join(" 対 ")}</div>
            <img src={`https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=${encodeURIComponent(urlFor(openMatch))}`} style={{ width: 240, height: 240 }} />
            <button onClick={() => setOpenMatch(null)} style={{ marginTop: 16, width: "100%", background: C.ink, color: "#fff", border: "none", borderRadius: 12, padding: "12px 0", fontSize: 15, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}>閉じる</button>
          </div>
        </div>
      )}
    </div>
  );
}
function EmptySlot({ label, small }) {
  return (
    <div style={{ background: C.zone, border: `1px dashed ${C.line}`, borderRadius: 14, padding: small ? "10px 4px" : "20px 4px", textAlign: "center", color: C.sub, fontSize: small ? 11 : 13 }}>
      {label}
    </div>
  );
}
function TimelineCard({ m, current, onOpen }) {
  const names = m.names || ["P1", "P2"];
  const raceTo = m.raceTo || [0, 0];
  const tot = m.tot || [0, 0];
  const balls = m.balls || [];
  const live = [balls.filter((b) => b.loc === "p1" && !b.dead).length, balls.filter((b) => b.loc === "p2" && !b.dead).length];
  const disp = current && m.phase === "play" ? [tot[0] + live[0], tot[1] + live[1]] : tot;
  const statusLabel = !current ? "次戦" : m.phase === "banking" ? "バンキング中" : m.phase === "done" ? "ラック終了" : `第${m.rack}R`;
  return (
    <div onClick={onOpen} style={{ background: current ? C.lightBlue : C.zone, border: `1.5px solid ${current ? C.blue : C.line}`, borderRadius: 14, padding: "10px 6px", cursor: "pointer" }}>
      <div style={{ textAlign: "center", fontSize: 10.5, color: current ? C.blue : C.sub, fontWeight: 800, marginBottom: 6 }}>{statusLabel}</div>
      <div style={{ display: "flex", gap: 4 }}>
        {[0, 1].map((i) => (
          <div key={i} style={{ flex: 1, textAlign: "center", minWidth: 0 }}>
            <div style={{ fontSize: 11.5, fontWeight: 700, color: i === 0 ? C.blue : C.red, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{names[i]}</div>
            <div style={{ fontSize: current ? 22 : 15, fontWeight: 800, color: C.ink }}>
              {current ? (m.phase === "banking" ? "–" : disp[i]) : ""}
              <span style={{ fontSize: current ? 11 : 12, opacity: 0.5 }}>{current ? "/" : ""}{raceTo[i]}</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
} catch (e) {
  showCrash(e.message + "\n" + (e.stack || ""));
}
</script>
</body>
</html>
