<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>JCL9Match B3 観戦ディスプレイ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  html, body, #root { margin: 0; padding: 0; height: 100%; background: #FFFFFF; }
</style>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<div id="crashlog" style="display:none; position:fixed; inset:0; background:#fff3f3; color:#7A2E2E; padding:16px; font-family:monospace; font-size:13px; white-space:pre-wrap; overflow:auto; z-index:9999;"></div>
<script>
  function showCrash(msg) {
    const el = document.getElementById("crashlog");
    el.style.display = "block";
    el.textContent = "エラーが発生しました:\n\n" + msg;
  }
  window.onerror = function (msg, src, line, col, err) {
    showCrash(msg + "\n" + (src || "") + ":" + line + ":" + col + "\n" + (err && err.stack ? err.stack : ""));
  };
  window.addEventListener("unhandledrejection", function (e) {
    showCrash("Promise rejected: " + (e.reason && e.reason.message ? e.reason.message : e.reason));
  });
</script>
<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const FONT = "'M PLUS Rounded 1c', system-ui, -apple-system, 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif";
const C = {
  bg: "#FFFFFF", panel: "#F5F6F8", ink: "#1C2530", sub: "#6A7480", line: "#E4E7EB",
  blue: "#2E6DB5", red: "#C6392E", win: "#2E7D46", hill: "#B26A1E", hillBg: "#FFF3E0",
};

/* ========= 共有バックエンド（B2と同じBin、読み取り専用） ========= */
const JSONBIN_ID = "6a59da56da38895dfe69af82";
const JSONBIN_KEY = "$2a$10$4387m6BO917eu5kfVN//hOwH0O4g1IHkX5sjqUfgj5Jf2t4VNUnwK";

async function jsonbinRead() {
  const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}/latest`, {
    headers: { "X-Master-Key": JSONBIN_KEY },
  });
  const data = await res.json();
  const record = data && data.record ? data.record : {};
  return record.matches && typeof record.matches === "object" ? record.matches : {};
}

const STALE_MS = 1000 * 60 * 60 * 6; // 6時間以上更新のない試合は無視（前日の残骸対策）

function isMatchFinished(m) {
  const rt = m.raceTo || [0, 0], tot = m.tot || [0, 0];
  return (rt[0] > 0 && tot[0] >= rt[0]) || (rt[1] > 0 && tot[1] >= rt[1]);
}
// 卓ごとの待機列：未終了の対戦を作成順に並べる。[0]が現在対戦中、[1]が次戦
function getQueueForTable(matches, tableNum) {
  const list = [];
  for (const id in matches) {
    const m = matches[id];
    if (!m || Number(m.table) !== tableNum) continue;
    if (!m.updatedAt || Date.now() - m.updatedAt > STALE_MS) continue;
    if (isMatchFinished(m)) continue;
    list.push({ ...m, id });
  }
  list.sort((a, b) => (a.createdAt || a.updatedAt) - (b.createdAt || b.updatedAt));
  return list;
}

function App() {
  const [queues, setQueues] = useState([[], [], []]);
  const [err, setErr] = useState(null);
  const [isFs, setIsFs] = useState(false);

  useEffect(() => {
    const onFsChange = () => setIsFs(!!document.fullscreenElement);
    document.addEventListener("fullscreenchange", onFsChange);
    return () => document.removeEventListener("fullscreenchange", onFsChange);
  }, []);

  const toggleFullscreen = () => {
    const el = document.documentElement;
    if (!document.fullscreenElement) {
      (el.requestFullscreen || el.webkitRequestFullscreen)?.call(el);
    } else {
      (document.exitFullscreen || document.webkitExitFullscreen)?.call(document);
    }
  };

  useEffect(() => {
    let stop = false;
    const tick = async () => {
      try {
        const matches = await jsonbinRead();
        if (stop) return;
        setQueues([1, 2, 3].map((t) => getQueueForTable(matches, t)));
        setErr(null);
      } catch (e) {
        if (!stop) setErr(String(e && e.message ? e.message : e));
      }
    };
    tick();
    const iv = setInterval(tick, 3000);
    return () => { stop = true; clearInterval(iv); };
  }, []);

  const nextMatches = queues
    .map((q, i) => (q[1] ? { ...q[1], tableNum: i + 1 } : null))
    .filter(Boolean);

  return (
    <div style={{ minHeight: "100vh", background: C.bg, fontFamily: FONT, padding: "18px", boxSizing: "border-box", position: "relative" }}>
      <button onClick={toggleFullscreen} style={{ position: "absolute", top: 10, right: 14, background: C.panel, border: `1px solid ${C.line}`, borderRadius: 10, color: C.sub, fontSize: 13, fontWeight: 700, padding: "6px 12px", cursor: "pointer", fontFamily: FONT, zIndex: 10 }}>
        {isFs ? "全画面を終了" : "⛶ 全画面表示"}
      </button>
      <div style={{
        display: "grid", gridTemplateColumns: "1fr 1fr", gridTemplateRows: "1fr 1fr",
        gridTemplateAreas: `"t1 t2" "next t3"`, gap: 16, height: "calc(100vh - 36px)", maxWidth: 1600, margin: "0 auto",
      }}>
        <div style={{ gridArea: "t1" }}><TablePanel tableNum={1} m={queues[0][0]} /></div>
        <div style={{ gridArea: "t2" }}><TablePanel tableNum={2} m={queues[1][0]} /></div>
        <div style={{ gridArea: "t3" }}><TablePanel tableNum={3} m={queues[2][0]} /></div>
        <div style={{ gridArea: "next" }}><NextList matches={nextMatches} /></div>
      </div>
      {err && <div style={{ color: C.red, textAlign: "center", marginTop: 12, fontSize: 13 }}>同期エラー: {err}</div>}
    </div>
  );
}

function NextList({ matches }) {
  return (
    <div style={{ height: "100%", background: C.panel, border: `1.5px solid ${C.line}`, borderRadius: 20, padding: "16px 18px", boxSizing: "border-box", overflow: "hidden" }}>
      <div style={{ fontSize: 15, fontWeight: 800, color: C.sub, letterSpacing: 2, marginBottom: 10 }}>次の試合</div>
      {matches.length === 0 && <div style={{ color: C.sub, fontSize: 14, opacity: 0.6, textAlign: "center", marginTop: 20 }}>予定なし</div>}
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {matches.map((m, i) => (
          <div key={m.id || i} style={{ display: "flex", alignItems: "center", gap: 10, background: "rgba(0,0,0,0.03)", borderRadius: 12, padding: "8px 12px" }}>
            <span style={{ fontSize: 12, fontWeight: 800, color: C.sub, flexShrink: 0 }}>卓{m.tableNum}</span>
            <span style={{ fontSize: 16, fontWeight: 700, color: C.ink, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
              {(m.names || ["", ""])[0]} <span style={{ color: C.sub, fontWeight: 400 }}>対</span> {(m.names || ["", ""])[1]}
            </span>
          </div>
        ))}
      </div>
    </div>
  );
}

function hillInfo(rt, disp) {
  if (rt <= 0) return null;
  const rem = rt - disp;
  if (rem <= 0) return { label: "達成", value: null };
  const toHill = rem - 14;
  return toHill > 0 ? { label: "ヒルまで", value: toHill } : { label: "勝ちまで", value: rem };
}
function TablePanel({ tableNum, m }) {
  if (!m) {
    return (
      <div style={{ height: "100%", boxSizing: "border-box", background: C.panel, border: `1.5px solid ${C.line}`, borderRadius: 20, padding: "24px 20px", color: C.sub, textAlign: "center", display: "flex", flexDirection: "column", justifyContent: "center" }}>
        <div style={{ fontSize: 20, fontWeight: 800, marginBottom: 24, letterSpacing: 2 }}>卓 {tableNum}</div>
        <div style={{ fontSize: 24, opacity: 0.6 }}>待機中</div>
      </div>
    );
  }

  const names = m.names || ["プレイヤー1", "プレイヤー2"];
  const raceTo = m.raceTo || [0, 0];
  const tot = m.tot || [0, 0];
  const balls = m.balls || [];
  const live = [
    balls.filter((b) => b.loc === "p1" && !b.dead).length,
    balls.filter((b) => b.loc === "p2" && !b.dead).length,
  ];
  const disp = m.phase === "play" ? [tot[0] + live[0], tot[1] + live[1]] : tot;
  const hillHill = raceTo[0] > 0 && raceTo[1] > 0 && raceTo[0] - tot[0] <= 14 && raceTo[1] - tot[1] <= 14;
  const matchWinner = m.phase === "banking" ? null :
    (tot[0] >= raceTo[0] && raceTo[0] > 0) ? 0 :
    (tot[1] >= raceTo[1] && raceTo[1] > 0) ? 1 :
    (!hillHill && disp[0] >= raceTo[0] && raceTo[0] > 0) ? 0 :
    (!hillHill && disp[1] >= raceTo[1] && raceTo[1] > 0) ? 1 : null;

  return (
    <div style={{ height: "100%", boxSizing: "border-box", background: C.panel, border: `1.5px solid ${C.line}`, borderRadius: 20, padding: "18px 22px", color: C.ink, display: "flex", flexDirection: "column" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <span style={{ fontSize: 17, fontWeight: 800, color: C.sub, letterSpacing: 2 }}>卓 {tableNum}</span>
        <span style={{ fontSize: 15, color: C.sub, fontWeight: 700 }}>
          {m.phase === "banking" ? "バンキング中" : matchWinner != null ? "試合終了" : ""}
        </span>
      </div>

      {hillHill && matchWinner == null && m.phase === "play" && (
        <div style={{ background: C.hillBg, color: C.hill, borderRadius: 10, padding: "5px 10px", textAlign: "center", fontSize: 15, fontWeight: 800, marginBottom: 8 }}>
          ヒルヒル
        </div>
      )}

      <div style={{ display: "flex", gap: 12, flex: 1, minHeight: 0 }}>
        {[0, 1].map((i) => {
          const pc = i === 0 ? C.blue : C.red;
          const hi = m.phase !== "banking" ? hillInfo(raceTo[i], disp[i]) : null;
          return (
            <div key={i} style={{ flex: 1, textAlign: "center", boxShadow: m.brk === i ? `inset 0 0 0 4px ${pc}` : "none", borderRadius: 16, padding: "10px 4px 8px", background: "rgba(0,0,0,0.035)", display: "flex", flexDirection: "column", justifyContent: "flex-start", overflow: "hidden" }}>
              <div style={{ fontSize: 24, fontWeight: 800, color: pc, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", minHeight: 30, display: "flex", alignItems: "center", justifyContent: "center" }}>{names[i]}</div>
              <div style={{ minHeight: "clamp(58px, 9.5vw, 96px)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                <div style={{ fontSize: "clamp(52px, 9vw, 92px)", fontWeight: 900, lineHeight: 1.15, fontVariantNumeric: "tabular-nums", color: C.ink, WebkitTextStroke: `1.5px ${pc}`, textShadow: `0 3px 0 rgba(0,0,0,0.08)` }}>
                  {m.phase === "banking" ? "–" : disp[i]}
                  <span style={{ fontSize: "0.42em", opacity: 0.55, WebkitTextStroke: "0px" }}>/{raceTo[i]}</span>
                </div>
              </div>
              {hi && (
                <div style={{ display: "inline-block", alignSelf: "center", background: "#fff", color: pc, borderRadius: 8, padding: "3px 12px", fontSize: 15, fontWeight: 800, marginTop: 4 }}>
                  {hi.value != null ? `${hi.label} ${hi.value}` : hi.label}
                </div>
              )}
              {m.brk === i && <div style={{ fontSize: 14, fontWeight: 800, color: pc, letterSpacing: 1, marginTop: 4 }}>● ブレイク</div>}
            </div>
          );
        })}
      </div>

      {matchWinner != null && (
        <div style={{ marginTop: 10, textAlign: "center", fontSize: 22, fontWeight: 800, color: C.win }}>
          🏆 {names[matchWinner]} 勝利
        </div>
      )}
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
} catch (e) {
  showCrash(e.message + "\n" + (e.stack || ""));
}
</script>
</body>
</html>
