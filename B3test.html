<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>JCL9Match B3 観戦ディスプレイ</title>
<style>
  html, body, #root { margin: 0; padding: 0; height: 100%; background: #FFFFFF; }
</style>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<div id="crashlog" style="display:none; position:fixed; inset:0; background:#fff3f3; color:#7A2E2E; padding:16px; font-family:monospace; font-size:13px; white-space:pre-wrap; overflow:auto; z-index:9999;"></div>
<script>
  function showCrash(msg) {
    const el = document.getElementById("crashlog");
    el.style.display = "block";
    el.textContent = "エラーが発生しました:\n\n" + msg;
  }
  window.onerror = function (msg, src, line, col, err) {
    showCrash(msg + "\n" + (src || "") + ":" + line + ":" + col + "\n" + (err && err.stack ? err.stack : ""));
  };
  window.addEventListener("unhandledrejection", function (e) {
    showCrash("Promise rejected: " + (e.reason && e.reason.message ? e.reason.message : e.reason));
  });
</script>
<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const FONT = "system-ui,-apple-system,'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif";
const C = {
  bg: "#FFFFFF", panel: "#F5F6F8", ink: "#1C2530", sub: "#6A7480", line: "#E4E7EB",
  blue: "#2E6DB5", red: "#C6392E", win: "#2E7D46", hill: "#B26A1E", hillBg: "#FFF3E0",
};

/* ========= 共有バックエンド（B2と同じBin、読み取り専用） ========= */
const JSONBIN_ID = "6a59da56da38895dfe69af82";
const JSONBIN_KEY = "$2a$10$4387m6BO917eu5kfVN//hOwH0O4g1IHkX5sjqUfgj5Jf2t4VNUnwK";

async function jsonbinRead() {
  const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}/latest`, {
    headers: { "X-Master-Key": JSONBIN_KEY },
  });
  const data = await res.json();
  const record = data && data.record ? data.record : {};
  return record.matches && typeof record.matches === "object" ? record.matches : {};
}

const STALE_MS = 1000 * 60 * 60 * 6; // 6時間以上更新のない試合は無視（前日の残骸対策）

function pickLatestForTable(matches, tableNum) {
  let best = null;
  for (const id in matches) {
    const m = matches[id];
    if (!m || Number(m.table) !== tableNum) continue;
    if (!m.updatedAt || Date.now() - m.updatedAt > STALE_MS) continue;
    if (!best || m.updatedAt > best.updatedAt) best = m;
  }
  return best;
}

function App() {
  const [slots, setSlots] = useState([null, null, null]);
  const [err, setErr] = useState(null);

  useEffect(() => {
    let stop = false;
    const tick = async () => {
      try {
        const matches = await jsonbinRead();
        if (stop) return;
        setSlots([1, 2, 3].map((t) => pickLatestForTable(matches, t)));
        setErr(null);
      } catch (e) {
        if (!stop) setErr(String(e && e.message ? e.message : e));
      }
    };
    tick();
    const iv = setInterval(tick, 3000);
    return () => { stop = true; clearInterval(iv); };
  }, []);

  return (
    <div style={{ minHeight: "100%", background: C.bg, fontFamily: FONT, padding: "24px 20px", boxSizing: "border-box" }}>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 20, maxWidth: 1400, margin: "0 auto" }}>
        {slots.map((m, i) => <TablePanel key={i} tableNum={i + 1} m={m} />)}
      </div>
      {err && <div style={{ color: C.red, textAlign: "center", marginTop: 16, fontSize: 13 }}>同期エラー: {err}</div>}
    </div>
  );
}

function TablePanel({ tableNum, m }) {
  if (!m) {
    return (
      <div style={{ flex: "1 1 380px", minWidth: 320, background: C.panel, border: `1.5px solid ${C.line}`, borderRadius: 20, padding: "24px 20px", color: C.sub, textAlign: "center" }}>
        <div style={{ fontSize: 18, fontWeight: 800, marginBottom: 40, letterSpacing: 2 }}>卓 {tableNum}</div>
        <div style={{ fontSize: 20, opacity: 0.6 }}>待機中</div>
      </div>
    );
  }

  const names = m.names || ["プレイヤー1", "プレイヤー2"];
  const raceTo = m.raceTo || [0, 0];
  const tot = m.tot || [0, 0];
  const balls = m.balls || [];
  const live = [
    balls.filter((b) => b.loc === "p1" && !b.dead).length,
    balls.filter((b) => b.loc === "p2" && !b.dead).length,
  ];
  const disp = m.phase === "play" ? [tot[0] + live[0], tot[1] + live[1]] : tot;
  const hillHill = raceTo[0] > 0 && raceTo[1] > 0 && raceTo[0] - tot[0] <= 14 && raceTo[1] - tot[1] <= 14;
  const matchWinner = m.phase === "banking" ? null :
    (tot[0] >= raceTo[0] && raceTo[0] > 0) ? 0 :
    (tot[1] >= raceTo[1] && raceTo[1] > 0) ? 1 :
    (!hillHill && disp[0] >= raceTo[0] && raceTo[0] > 0) ? 0 :
    (!hillHill && disp[1] >= raceTo[1] && raceTo[1] > 0) ? 1 : null;

  return (
    <div style={{ flex: "1 1 380px", minWidth: 320, background: C.panel, border: `1.5px solid ${C.line}`, borderRadius: 20, padding: "18px 18px 22px", color: C.ink }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
        <span style={{ fontSize: 15, fontWeight: 800, color: C.sub, letterSpacing: 2 }}>卓 {tableNum}</span>
        <span style={{ fontSize: 13, color: C.sub }}>
          {m.phase === "banking" ? "バンキング中" : matchWinner != null ? "試合終了" : `第${m.rack}ラック`}
        </span>
      </div>

      {hillHill && matchWinner == null && m.phase === "play" && (
        <div style={{ background: C.hillBg, color: C.hill, borderRadius: 8, padding: "4px 8px", textAlign: "center", fontSize: 12.5, fontWeight: 800, marginBottom: 10 }}>
          ヒルヒル
        </div>
      )}

      <div style={{ display: "flex", gap: 10 }}>
        {[0, 1].map((i) => {
          const pc = i === 0 ? C.blue : C.red;
          return (
            <div key={i} style={{ flex: 1, textAlign: "center", boxShadow: m.brk === i ? `inset 0 0 0 3px ${pc}` : "none", borderRadius: 14, padding: "10px 4px", background: "rgba(0,0,0,0.03)" }}>
              <div style={{ fontSize: 16, fontWeight: 800, color: pc, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{names[i]}</div>
              <div style={{ fontSize: 46, fontWeight: 800, lineHeight: 1.1, fontVariantNumeric: "tabular-nums" }}>
                {m.phase === "banking" ? "–" : disp[i]}
                <span style={{ fontSize: 20, opacity: 0.55 }}>/{raceTo[i]}</span>
              </div>
              {m.brk === i && <div style={{ fontSize: 10.5, fontWeight: 800, color: pc, letterSpacing: 1, marginTop: 2 }}>● BREAK</div>}
            </div>
          );
        })}
      </div>

      {matchWinner != null && (
        <div style={{ marginTop: 12, textAlign: "center", fontSize: 16, fontWeight: 800, color: C.win }}>
          🏆 {names[matchWinner]} 勝利
        </div>
      )}
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
} catch (e) {
  showCrash(e.message + "\n" + (e.stack || ""));
}
</script>
</body>
</html>
